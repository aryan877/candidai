services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: candidai
      POSTGRES_USER: candidai
      POSTGRES_PASSWORD: candidai
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candidai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_dev_data:
