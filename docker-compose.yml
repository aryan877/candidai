services:
  postgres:
    image: pgvector/pgvector:pg16
    env_file: ./agent/.env
    environment:
      POSTGRES_DB: candidai
      POSTGRES_USER: candidai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-candidai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candidai"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8765:8765"
    volumes:
      - fastembed_cache:/app/.fastembed_cache
    env_file: ./agent/.env
    environment:
      - DATABASE_URL=postgresql://candidai:${POSTGRES_PASSWORD:-candidai}@postgres:5432/candidai
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: ./web/.env.local
    environment:
      - NODE_ENV=production
      - AGENT_SERVER_URL=http://agent:8765
    depends_on:
      - agent
    restart: unless-stopped

volumes:
  postgres_data:
  fastembed_cache:
