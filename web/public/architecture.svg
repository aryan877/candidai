<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
  </defs>
  <style>
    text{font-family:system-ui,-apple-system,sans-serif}
    .h{font-size:14px;font-weight:700;fill:#fff}
    .t{font-size:11px;fill:#cbd5e1}
    .l{font-size:11px;font-weight:600;fill:#94a3b8}
    .a{font-size:12px;font-weight:700;fill:#a78bfa}
    .s{font-size:10px;fill:#64748b}
  </style>

  <rect width="900" height="500" rx="16" fill="#0f172a"/>

  <!-- ========== BROWSER ========== -->
  <rect x="30" y="30" width="280" height="270" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="30" y="30" width="280" height="38" rx="12" fill="#3b82f6"/>
  <rect x="30" y="56" width="280" height="12" fill="#3b82f6"/>
  <text x="170" y="56" text-anchor="middle" class="h">Frontend (Next.js 15)</text>

  <circle cx="55" cy="88" r="4" fill="#3b82f6"/><text x="70" y="92" class="t">React 19 + Tailwind v4</text>
  <circle cx="55" cy="112" r="4" fill="#3b82f6"/><text x="70" y="116" class="t">Monaco Code Editor</text>
  <circle cx="55" cy="136" r="4" fill="#3b82f6"/><text x="70" y="140" class="t">SVG Avatar (Animated)</text>
  <circle cx="55" cy="160" r="4" fill="#3b82f6"/><text x="70" y="164" class="t">Recharts (Reports)</text>
  <circle cx="55" cy="184" r="4" fill="#3b82f6"/><text x="70" y="188" class="t">Convex Client</text>
  <circle cx="55" cy="208" r="4" fill="#3b82f6"/><text x="70" y="212" class="t">shadcn/ui Components</text>
  <circle cx="55" cy="232" r="4" fill="#3b82f6"/><text x="70" y="236" class="t">Stream Video SDK</text>
  <circle cx="55" cy="256" r="4" fill="#3b82f6"/><text x="70" y="260" class="t">Framer Motion</text>

  <!-- ========== AGENT ========== -->
  <rect x="590" y="30" width="280" height="270" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="590" y="30" width="280" height="38" rx="12" fill="#8b5cf6"/>
  <rect x="590" y="56" width="280" height="12" fill="#8b5cf6"/>
  <text x="730" y="56" text-anchor="middle" class="h">Agent (Python)</text>

  <circle cx="615" cy="88" r="4" fill="#8b5cf6"/><text x="630" y="92" class="t">GPT-5.2 LLM (Vision)</text>
  <circle cx="615" cy="112" r="4" fill="#8b5cf6"/><text x="630" y="116" class="t">Deepgram STT</text>
  <circle cx="615" cy="136" r="4" fill="#8b5cf6"/><text x="630" y="140" class="t">Edge TTS (Free Neural)</text>
  <circle cx="615" cy="160" r="4" fill="#8b5cf6"/><text x="630" y="164" class="t">YOLO Pose Detection</text>
  <circle cx="615" cy="184" r="4" fill="#8b5cf6"/><text x="630" y="188" class="t">Smart Turn Detection</text>
  <circle cx="615" cy="208" r="4" fill="#8b5cf6"/><text x="630" y="212" class="t">PostgreSQL + pgvector</text>
  <circle cx="615" cy="232" r="4" fill="#8b5cf6"/><text x="630" y="236" class="t">Vision Agents SDK</text>
  <circle cx="615" cy="256" r="4" fill="#8b5cf6"/><text x="630" y="260" class="t">10 Function Tools</text>

  <!-- ========== WEBRTC ARROW ========== -->
  <rect x="355" y="140" width="190" height="38" rx="19" fill="url(#g)" opacity="0.12"/>
  <line x1="320" y1="160" x2="580" y2="160" stroke="url(#g)" stroke-width="2.5" stroke-dasharray="6 4"/>
  <polygon points="580,153 595,160 580,167" fill="#8b5cf6"/>
  <polygon points="320,153 305,160 320,167" fill="#3b82f6"/>
  <text x="450" y="164" text-anchor="middle" class="a">WebRTC (Stream)</text>

  <!-- ========== CONVEX DB ========== -->
  <rect x="100" y="360" width="230" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <rect x="100" y="360" width="230" height="36" rx="12" fill="#14b8a6"/>
  <rect x="100" y="384" width="230" height="12" fill="#14b8a6"/>
  <text x="215" y="384" text-anchor="middle" class="h">Convex Cloud</text>
  <text x="215" y="418" text-anchor="middle" class="t">7 tables: users, interviews,</text>
  <text x="215" y="434" text-anchor="middle" class="t">reports, scores, transcripts,</text>
  <text x="215" y="450" text-anchor="middle" class="t">codeSubmissions, bodyLanguage</text>

  <line x1="170" y1="300" x2="170" y2="352" stroke="#14b8a6" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="163,350 170,362 177,350" fill="#14b8a6"/>
  <text x="185" y="332" class="l">persist</text>

  <!-- ========== CUSTOM EVENTS ========== -->
  <rect x="590" y="360" width="230" height="100" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="705" y="388" text-anchor="middle" class="l">Custom Events</text>
  <text x="705" y="408" text-anchor="middle" class="s">avatar · scores · phases</text>
  <text x="705" y="424" text-anchor="middle" class="s">body language · transcripts</text>
  <text x="705" y="440" text-anchor="middle" class="s">coding challenges · reports</text>

  <line x1="730" y1="300" x2="730" y2="352" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6 4"/>
  <polygon points="723,350 730,362 737,350" fill="#8b5cf6"/>
</svg>