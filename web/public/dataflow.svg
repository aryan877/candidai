<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .col-title { font-size: 14px; font-weight: 700; fill: #fff; }
    .flow-label { font-size: 10px; font-weight: 600; fill: #e2e8f0; }
    .sub-label { font-size: 9px; fill: #94a3b8; }
    .component { font-size: 10px; fill: #cbd5e1; }
  </style>

  <rect width="960" height="400" rx="12" fill="#0f172a"/>

  <!-- Column 1: Browser -->
  <rect x="40" y="30" width="200" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="40" y="30" width="200" height="36" rx="12" fill="#3b82f6"/>
  <rect x="40" y="54" width="200" height="12" fill="#3b82f6"/>
  <text x="140" y="54" text-anchor="middle" class="col-title">Browser</text>
  <!-- Webcam icon -->
  <circle cx="140" cy="110" r="28" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="124" y="98" width="32" height="22" rx="4" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <polygon points="156,102 168,96 168,122 156,116" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="158" text-anchor="middle" class="component">Webcam + Mic</text>
  <!-- Speaker icon -->
  <circle cx="140" cy="210" r="22" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="130" y="202" width="8" height="16" rx="1" fill="#3b82f6"/>
  <polygon points="138,198 152,190 152,230 138,222" fill="none" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="140" y="250" text-anchor="middle" class="component">Speaker</text>
  <!-- UI -->
  <rect x="76" y="270" width="128" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="289" text-anchor="middle" class="component">Avatar + UI + Editor</text>
  <!-- Events listen -->
  <rect x="76" y="308" width="128" height="28" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="327" text-anchor="middle" class="component">call.on("custom")</text>

  <!-- Column 2: Stream SFU -->
  <rect x="340" y="30" width="200" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <defs>
    <linearGradient id="sfu-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect x="340" y="30" width="200" height="36" rx="12" fill="url(#sfu-grad)"/>
  <rect x="340" y="54" width="200" height="12" fill="url(#sfu-grad)"/>
  <text x="440" y="54" text-anchor="middle" class="col-title">Stream SFU</text>
  <!-- Cloud shape -->
  <ellipse cx="440" cy="120" rx="50" ry="30" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="440" y="124" text-anchor="middle" class="component">Edge Network</text>
  <text x="440" y="172" text-anchor="middle" class="sub-label">500ms join latency</text>
  <text x="440" y="188" text-anchor="middle" class="sub-label">&lt;30ms A/V latency</text>
  <!-- SFU features -->
  <rect x="370" y="210" width="140" height="24" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1"/>
  <text x="440" y="226" text-anchor="middle" class="component">Audio Routing</text>
  <rect x="370" y="244" width="140" height="24" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1"/>
  <text x="440" y="260" text-anchor="middle" class="component">Video Forwarding</text>
  <rect x="370" y="278" width="140" height="24" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1"/>
  <text x="440" y="294" text-anchor="middle" class="component">Custom Events</text>
  <rect x="370" y="312" width="140" height="24" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="1"/>
  <text x="440" y="328" text-anchor="middle" class="component">Track Priority</text>

  <!-- Column 3: AI Agent -->
  <rect x="640" y="30" width="280" height="340" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="640" y="30" width="280" height="36" rx="12" fill="#8b5cf6"/>
  <rect x="640" y="54" width="280" height="12" fill="#8b5cf6"/>
  <text x="780" y="54" text-anchor="middle" class="col-title">AI Agent Pipeline</text>

  <!-- Pipeline steps -->
  <rect x="670" y="82" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="101" class="component">1.</text>
  <text x="700" y="101" class="flow-label">Deepgram STT</text>
  <text x="838" y="101" class="sub-label">audio → text</text>

  <line x1="780" y1="112" x2="780" y2="126" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="776,124 780,132 784,124" fill="#6d28d9"/>

  <rect x="670" y="132" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="151" class="component">2.</text>
  <text x="700" y="151" class="flow-label">YOLO Pose</text>
  <text x="820" y="151" class="sub-label">video → metrics</text>

  <line x1="780" y1="162" x2="780" y2="176" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="776,174 780,182 784,174" fill="#6d28d9"/>

  <rect x="670" y="182" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="201" class="component">3.</text>
  <text x="700" y="201" class="flow-label">Gemini Flash LLM</text>
  <text x="852" y="201" class="sub-label">+ 5 frames</text>

  <line x1="780" y1="212" x2="780" y2="226" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="776,224 780,232 784,224" fill="#6d28d9"/>

  <rect x="670" y="232" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="251" class="component">4.</text>
  <text x="700" y="251" class="flow-label">Function Tools (9)</text>
  <text x="855" y="251" class="sub-label">actions</text>

  <line x1="780" y1="262" x2="780" y2="276" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="776,274 780,282 784,274" fill="#6d28d9"/>

  <rect x="670" y="282" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="301" class="component">5.</text>
  <text x="700" y="301" class="flow-label">Edge TTS</text>
  <text x="830" y="301" class="sub-label">text → audio</text>

  <line x1="780" y1="312" x2="780" y2="326" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="776,324 780,332 784,324" fill="#6d28d9"/>

  <rect x="670" y="332" width="220" height="30" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="680" y="351" class="component">6.</text>
  <text x="700" y="351" class="flow-label">send_custom_event()</text>

  <!-- Arrows: Browser → SFU -->
  <line x1="240" y1="105" x2="330" y2="105" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="328,100 340,105 328,110" fill="#3b82f6"/>
  <text x="285" y="98" text-anchor="middle" class="sub-label">audio + video</text>

  <!-- Arrows: SFU → Agent -->
  <line x1="540" y1="105" x2="630" y2="105" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="628,100 640,105 628,110" fill="#8b5cf6"/>
  <text x="585" y="98" text-anchor="middle" class="sub-label">tracks</text>

  <!-- Arrows: Agent → SFU (audio back) -->
  <line x1="640" y1="340" x2="548" y2="340" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="550,335 540,340 550,345" fill="#8b5cf6"/>
  <text x="590" y="358" text-anchor="middle" class="sub-label">agent audio + events</text>

  <!-- Arrows: SFU → Browser -->
  <line x1="340" y1="290" x2="248" y2="290" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="250,285 240,290 250,295" fill="#3b82f6"/>
  <text x="290" y="282" text-anchor="middle" class="sub-label">audio + events</text>
</svg>
