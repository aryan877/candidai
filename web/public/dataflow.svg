<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" fill="none">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6d28d9"/><stop offset="100%" stop-color="#4c1d95"/></linearGradient>
  </defs>
  <style>
    text{font-family:system-ui,-apple-system,sans-serif}
    .h{font-size:15px;font-weight:700;fill:#fff}
    .t{font-size:11px;fill:#cbd5e1}
    .s{font-size:10px;fill:#94a3b8}
    .b{font-size:11px;font-weight:600;fill:#e2e8f0}
  </style>

  <rect width="900" height="460" rx="16" fill="#0f172a"/>

  <!-- ========== BROWSER ========== -->
  <rect x="30" y="30" width="220" height="400" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="30" y="30" width="220" height="42" rx="12" fill="#3b82f6"/>
  <rect x="30" y="60" width="220" height="12" fill="#3b82f6"/>
  <text x="140" y="58" text-anchor="middle" class="h">BROWSER</text>

  <rect x="50" y="90" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="111" text-anchor="middle" class="t">Webcam + Microphone</text>

  <rect x="50" y="135" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="156" text-anchor="middle" class="t">Audio Output</text>

  <rect x="50" y="185" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="206" text-anchor="middle" class="t">Avatar + UI + Editor</text>

  <rect x="50" y="230" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="251" text-anchor="middle" class="t">call.on("custom")</text>

  <rect x="50" y="280" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="301" text-anchor="middle" class="t">Convex Cloud DB</text>

  <rect x="50" y="325" width="180" height="32" rx="6" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="140" y="346" text-anchor="middle" class="t">Recharts Reports</text>

  <!-- ========== STREAM SFU ========== -->
  <rect x="300" y="30" width="220" height="400" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="300" y="30" width="220" height="42" rx="12" fill="url(#g1)"/>
  <rect x="300" y="60" width="220" height="12" fill="url(#g1)"/>
  <text x="410" y="58" text-anchor="middle" class="h">STREAM SFU</text>

  <rect x="320" y="90" width="180" height="44" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="410" y="111" text-anchor="middle" class="b">Edge Network</text>
  <text x="410" y="127" text-anchor="middle" class="s">&lt;30ms latency</text>

  <rect x="320" y="152" width="180" height="32" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="410" y="173" text-anchor="middle" class="t">Audio Routing</text>

  <rect x="320" y="197" width="180" height="32" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="410" y="218" text-anchor="middle" class="t">Video Forwarding</text>

  <rect x="320" y="242" width="180" height="32" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="410" y="263" text-anchor="middle" class="t">Custom Events</text>

  <rect x="320" y="287" width="180" height="32" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="410" y="308" text-anchor="middle" class="t">Track Priority</text>

  <!-- ========== AI AGENT ========== -->
  <rect x="570" y="30" width="300" height="400" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <rect x="570" y="30" width="300" height="42" rx="12" fill="#8b5cf6"/>
  <rect x="570" y="60" width="300" height="12" fill="#8b5cf6"/>
  <text x="720" y="58" text-anchor="middle" class="h">AI AGENT PIPELINE</text>

  <!-- Step 1 -->
  <rect x="590" y="90" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="111" class="b">1. Deepgram STT</text>
  <text x="840" y="111" text-anchor="end" class="s">audio → text</text>

  <line x1="720" y1="122" x2="720" y2="136" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="716,134 720,142 724,134" fill="#6d28d9"/>

  <!-- Step 2 -->
  <rect x="590" y="140" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="161" class="b">2. YOLO Pose</text>
  <text x="840" y="161" text-anchor="end" class="s">video → metrics</text>

  <line x1="720" y1="172" x2="720" y2="186" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="716,184 720,192 724,184" fill="#6d28d9"/>

  <!-- Step 3 -->
  <rect x="590" y="190" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="211" class="b">3. GPT-5.2 LLM</text>
  <text x="840" y="211" text-anchor="end" class="s">+ 5 frames</text>

  <line x1="720" y1="222" x2="720" y2="236" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="716,234 720,242 724,234" fill="#6d28d9"/>

  <!-- Step 4 -->
  <rect x="590" y="240" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="261" class="b">4. Function Tools (10)</text>
  <text x="840" y="261" text-anchor="end" class="s">actions</text>

  <line x1="720" y1="272" x2="720" y2="286" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="716,284 720,292 724,284" fill="#6d28d9"/>

  <!-- Step 5 -->
  <rect x="590" y="290" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="311" class="b">5. Edge TTS</text>
  <text x="840" y="311" text-anchor="end" class="s">text → audio</text>

  <line x1="720" y1="322" x2="720" y2="336" stroke="#6d28d9" stroke-width="1.5"/>
  <polygon points="716,334 720,342 724,334" fill="#6d28d9"/>

  <!-- Step 6 -->
  <rect x="590" y="340" width="260" height="32" rx="6" fill="#2d1b69" stroke="#8b5cf6" stroke-width="1"/>
  <text x="600" y="361" class="b">6. send_custom_event()</text>
  <text x="840" y="361" text-anchor="end" class="s">→ browser</text>

  <!-- ========== ARROWS ========== -->
  <!-- Browser → SFU top -->
  <line x1="250" y1="106" x2="295" y2="106" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="293,101 303,106 293,111" fill="#3b82f6"/>
  <text x="272" y="98" text-anchor="middle" class="s">audio + video</text>

  <!-- SFU → Agent top -->
  <line x1="520" y1="106" x2="565" y2="106" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="563,101 573,106 563,111" fill="#8b5cf6"/>
  <text x="542" y="98" text-anchor="middle" class="s">tracks</text>

  <!-- Agent → SFU bottom -->
  <line x1="570" y1="395" x2="525" y2="395" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="527,390 517,395 527,400" fill="#8b5cf6"/>
  <text x="547" y="418" text-anchor="middle" class="s">agent audio + events</text>

  <!-- SFU → Browser bottom -->
  <line x1="300" y1="395" x2="255" y2="395" stroke="#3b82f6" stroke-width="2"/>
  <polygon points="257,390 247,395 257,400" fill="#3b82f6"/>
  <text x="277" y="418" text-anchor="middle" class="s">audio + events</text>
</svg>